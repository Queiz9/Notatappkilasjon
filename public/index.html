<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container wide">
        <h1>Notater</h1>

        <div class="card green-border">
            <h2>Nytt Notat</h2>
            <input id="tittel-notat" type="text" placeholder="Tittel på notat">
            <textarea id="notat-tekst" placeholder="Skriv notatet ditt her..."></textarea>
            <button onclick="lagreNotat()" class="btn-main">Lagre Notat</button>
        </div>

        <h3>Dine Notater</h3>
        <div id="output-notat"></div>
    </div>

    <script>
        async function lagreNotat() {
            const t = document.getElementById('tittel-notat').value;
            const c = document.getElementById('notat-tekst').value;
            await fetch('/lagre', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: t, content: c, type: 'notat' })
            });
            document.getElementById('tittel-notat').value = "";
            document.getElementById('notat-tekst').value = "";
            hentData();
        }

        async function hentData() {
            const svar = await fetch('/hent');
            const data = await svar.json();
            let html = "";
            data.forEach((n) => {
                html += `<div class="card"><button onclick="slettNotat(${n.id})" class="btn-delete">Slett</button><h3>${n.title}</h3><p>${n.content}</p></div>`;
            });
            document.getElementById('output-notat').innerHTML = html;
        }

        async function slettNotat(id) {
            await fetch(`/slett/${id}`, { method: 'DELETE' });
            hentData();
        }

        window.onload = hentData;
    </script>
</body>
</html>
